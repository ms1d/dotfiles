# ============================
#   HiDPI Unified Config
# ============================

# --- XWayland crisp rendering
xwayland {
    force_zero_scaling = true
}

# --- Global font DPI
env = XFT_DPI,140

# --- GTK scaling
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1.5

# --- Qt scaling
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1.5
env = QT_FONT_DPI,140

